<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StageVerify — Vendor Demo QR</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0a3161;
        color: #fff;
        padding: 24px;
      }
      main {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #fff;
        color: #0f172a;
        border-radius: 16px;
        padding: 28px 24px 32px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        color: #0a3161;
      }
      .subtitle {
        margin: 0 0 24px;
        font-size: 0.95rem;
        color: #64748b;
      }
      #qr-wrap {
        display: inline-block;
        padding: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
      }
      canvas {
        display: block;
      }
      dl {
        margin: 24px 0 0;
        text-align: left;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px 16px;
        font-size: 0.95rem;
      }
      dt {
        font-weight: 600;
        color: #475569;
      }
      dd {
        margin: 0;
      }
      .pin {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #bf0a30;
      }
      ol {
        margin: 20px 0 0;
        padding-left: 1.25rem;
        text-align: left;
        color: #475569;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .url {
        margin-top: 16px;
        word-break: break-all;
        font-size: 0.75rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vendor receive demo</h1>
      <p class="subtitle">Scan with iPhone Camera — same QR as a zone e-tag</p>
      <div id="qr-wrap"><canvas id="qr"></canvas></div>
      <dl>
        <dt>Order</dt>
        <dd>ORD-005 (Johnstone Supply)</dd>
        <dt>PIN</dt>
        <dd class="pin">1234</dd>
        <dt>After scan</dt>
        <dd>Check items → zone → Submit Check-in</dd>
      </dl>
      <ol>
        <li>Open iPhone Camera and point at this QR.</li>
        <li>Tap the banner → Safari opens Vendor Portal.</li>
        <li>Enter PIN <strong>1234</strong> on the keypad.</li>
      </ol>
      <p class="url" id="target-url"></p>
    </main>
    <script type="module">
      import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm";

      const url =
        "https://lgarage.github.io/stageverify/#/r?i=delivery-demo-vendor-1";
      document.getElementById("target-url").textContent = url;

      await QRCode.toCanvas(document.getElementById("qr"), url, {
        width: 300,
        margin: 2,
        errorCorrectionLevel: "M",
      });
    </script>
  </body>
</html>
